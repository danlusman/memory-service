# App code lives in the image (COPY from Dockerfile): plain `docker compose up -d`
# reuses whatever image was last built. After editing sources, either run
# `docker compose up -d --build` or use `docker compose watch` below.
services:
  memory-service:
    build: .
    # Rebuild/recreate container when `./src` changes (run: docker compose watch)
    develop:
      watch:
        - action: rebuild
          path: ./src
    container_name: memory-service
    ports:
      - "8080:8080"
    environment:
      MEMORY_DB_PATH: /data/memory.db
      MEMORY_AUTH_TOKEN: ${MEMORY_AUTH_TOKEN:-}
      MAX_PAYLOAD_BYTES: ${MAX_PAYLOAD_BYTES:-1048576}
    volumes:
      - memory_data:/data
    restart: unless-stopped

volumes:
  memory_data:
    name: memory_data
